<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXYOVI — Minimal Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #video-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      cursor: pointer;
    }
    #overlay {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      pointer-events: none;
      opacity: 0.5;
    }
    #controls {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    #controls button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #888;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #controls button:hover {
      background: rgba(200,164,84,0.15);
      border-color: #c8a454;
      color: #c8a454;
    }
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #c8a454;
      z-index: 10;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>

  <canvas id="video-canvas"></canvas>
  <div id="progress-bar"></div>
  <div id="overlay">click anywhere to toggle play/pause · NEXYOVI</div>
  <div id="controls">
    <button onclick="togglePlay()">⏸ Play/Pause</button>
    <button onclick="restart()">↺ Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Scenes ────────────────────────────────────────────
    const TOTAL_DURATION = 30; // seconds
    const SCENES = [
      { start: 0,  end: 4,   label: 'intro' },
      { start: 4,  end: 8,   label: 'mission' },
      { start: 8,  end: 14,  label: 'services' },
      { start: 14, end: 20,  label: 'values' },
      { start: 20, end: 26,  label: 'cta' },
      { start: 26, end: 30,  label: 'outro' },
    ];

    // ── Particles ─────────────────────────────────────────
    const PARTICLES = [];
    for (let i = 0; i < 80; i++) {
      PARTICLES.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2 + 0.5,
        a: Math.random() * 0.3 + 0.05,
      });
    }

    // ── State ─────────────────────────────────────────────
    let time = 0;
    let playing = true;
    let lastFrame = 0;

    // ── Helper: hex to rgba ───────────────────────────────
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return { r, g, b };
    }
    const GOLD = hexToRgb('#c8a454');
    const WHITE = hexToRgb('#ffffff');

    // ── Draw text with fade ───────────────────────────────
    function drawMain(lines, yPos, progress, goldIdx = -1, size = 48) {
      const alpha = Math.min(1, Math.max(0, progress));
      if (alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      lines.forEach((line, i) => {
        const isGold = i === goldIdx;
        const fontSize = size - i * 4;
        ctx.font = `700 ${fontSize}px system-ui, -apple-system, sans-serif`;
        ctx.fillStyle = isGold ? `rgba(${GOLD.r},${GOLD.g},${GOLD.b},1)` : `rgba(${WHITE.r},${WHITE.g},${WHITE.b},1)`;
        ctx.fillText(line, W/2, yPos + i * (fontSize * 1.2));
      });
      
      ctx.restore();
    }

    function drawSub(text, yPos, progress) {
      const alpha = Math.min(1, Math.max(0, progress));
      if (alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = alpha * 0.6;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '300 18px system-ui, -apple-system, sans-serif';
      ctx.fillStyle = `rgba(${WHITE.r},${WHITE.g},${WHITE.b},1)`;
      ctx.fillText(text, W/2, yPos);
      ctx.restore();
    }

    // ── Particle animation ────────────────────────────────
    function updateParticles() {
      for (const p of PARTICLES) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
      }
    }

    function drawParticles() {
      for (const p of PARTICLES) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${GOLD.r},${GOLD.g},${GOLD.b},${p.a})`;
        ctx.fill();
      }
    }

    // ── Draw scene ────────────────────────────────────────
    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    function sceneProgress(scene, t) {
      const duration = scene.end - scene.start;
      const raw = (t - scene.start) / duration;
      return Math.max(0, Math.min(1, raw));
    }

    function fadeInOut(t, fadeIn = 0.15, fadeOut = 0.15) {
      if (t < fadeIn) return t / fadeIn;
      if (t > 1 - fadeOut) return (1 - t) / fadeOut;
      return 1;
    }

    function drawScene(time) {
      ctx.clearRect(0, 0, W, H);
      
      // Background gradient
      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
      grad.addColorStop(0, '#1a1a1a');
      grad.addColorStop(0.5, '#0d0d0d');
      grad.addColorStop(1, '#000000');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Particles (always)
      drawParticles();

      // ── Find current scene ──────────────────────────────
      const current = SCENES.find(s => time >= s.start && time < s.end) || SCENES[SCENES.length - 1];
      const p = sceneProgress(current, time);

      switch (current.label) {
        case 'intro': {
          const f = fadeInOut(p, 0.2, 0.1);
          const y = H/2 - 20;
          drawMain(['NEXYOVI'], y, f, 0, 72 + 12);
          drawSub('Africa\'s Engineering Partner', y + 70, f * (p > 0.3 ? 1 : 0));
          break;
        }
        case 'mission': {
          const f = fadeInOut(p, 0.15, 0.15);
          const y = H/2 - 30;
          drawMain([
            'Building Ethiopia\'s',
            'Digital Future'
          ], y, f, 1);
          drawSub('Senior engineering, rooted in Addis Ababa — deployed globally', y + 100, f * (p > 0.25 ? 1 : 0));
          break;
        }
        case 'services': {
          const f = fadeInOut(p, 0.1, 0.1);
          const svcs = ['AI & Automation', 'Software Engineering', 'Cybersecurity', 'Cloud Infrastructure', 'NexiLocate', 'Enterprise Networking'];
          const total = svcs.length;
          ctx.save();
          ctx.globalAlpha = f;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = '600 22px system-ui, -apple-system, sans-serif';
          const startY = H/2 - ((total-1) * 30) / 2;
          svcs.forEach((s, i) => {
            const itemP = Math.min(1, Math.max(0, (p - i * 0.06) * 3));
            if (itemP <= 0) return;
            const alpha = itemP;
            const x = W/2 + (1 - itemP) * 40;
            ctx.globalAlpha = f * alpha;
            ctx.fillStyle = i % 2 === 0 ? `rgba(${GOLD.r},${GOLD.g},${GOLD.b},1)` : `rgba(${WHITE.r},${WHITE.g},${WHITE.b},1)`;
            ctx.fillText(s, x, startY + i * 42);
          });
          ctx.restore();
          break;
        }
        case 'values': {
          const f = fadeInOut(p, 0.1, 0.1);
          const vals = [
            'Senior-Only Teams',
            'Partnership-First',
            'Built for Africa',
            'End-to-End Delivery'
          ];
          ctx.save();
          ctx.globalAlpha = f;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const startY = H/2 - 60;
          vals.forEach((v, i) => {
            const itemP = Math.min(1, Math.max(0, (p - i * 0.08) * 2.5));
            if (itemP <= 0) return;
            ctx.globalAlpha = f * itemP;
            ctx.font = (i === 0 ? '700 26px' : '400 20px') + ' system-ui, -apple-system, sans-serif';
            ctx.fillStyle = i === 0 ? `rgba(${GOLD.r},${GOLD.g},${GOLD.b},1)` : `rgba(${WHITE.r},${WHITE.g},${WHITE.b},0.8)`;
            ctx.fillText(v, W/2, startY + i * 44);
          });
          ctx.restore();
          break;
        }
        case 'cta': {
          const f = fadeInOut(p, 0.2, 0.1);
          const y = H/2 - 30;
          drawMain([
            'Ready to build?'
          ], y, f, 0, 56);
          drawSub('nexyovi.com', y + 70, f * (p > 0.3 ? 1 : 0));
          break;
        }
        case 'outro': {
          const f = fadeInOut(p, 0.15, 0.2);
          const y = H/2 - 20;
          drawMain([
            'NEXYOVI',
            'Technologies'
          ], y - 20, f, 0, 52);
          drawSub('Building Ethiopia\'s Digital Future', y + 80, f * (p > 0.3 ? 1 : 0));
          break;
        }
      }
    }

    // ── Main loop ─────────────────────────────────────────
    function loop(timestamp) {
      if (!lastFrame) lastFrame = timestamp;
      const dt = (timestamp - lastFrame) / 1000;
      lastFrame = timestamp;

      if (playing) {
        time += dt;
        if (time > TOTAL_DURATION) time = 0; // loop
      }

      drawScene(time);

      // Progress bar
      document.getElementById('progress-bar').style.width = `${(time / TOTAL_DURATION) * 100}%`;

      requestAnimationFrame(loop);
    }

    // ── Controls ──────────────────────────────────────────
    function togglePlay() { playing = !playing; }
    function restart() { time = 0; playing = true; }
    canvas.addEventListener('click', togglePlay);

    // ── Start ─────────────────────────────────────────────
    requestAnimationFrame(loop);
  </script>
</body>
</html>
